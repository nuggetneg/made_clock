<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MADE Clock</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0e0c0a, #1a140f);
      color: #d7b46a;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 88%;
      height: 88%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      box-sizing: border-box;
      padding: 4% 6%;
    }

    .brand {
      font-size: 1.1rem;
      letter-spacing: 0.35rem;
      opacity: 0.75;
      margin-bottom: 1rem;
    }

    .time {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: bold;
      line-height: 1;
      text-shadow: 0 0 12px rgba(215,180,106,0.18);
      margin: 0;
    }

    .date {
      margin-top: 1rem;
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      opacity: 0.9;
      letter-spacing: 0.03rem;
    }

    .sub {
      margin-top: 1.25rem;
      font-size: clamp(0.8rem, 2vw, 1rem);
      opacity: 0.45;
      letter-spacing: 0.15rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">MADE OS</div>
    <div id="time" class="time">00:00</div>
    <div id="date" class="date">Loading...</div>
    <div class="sub">SCREEN SAVER</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();

      const time = now.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
      });

      const date = now.toLocaleDateString([], {
        weekday: 'long',
        month: 'long',
        day: 'numeric'
      });

      document.getElementById('time').textContent = time;
      document.getElementById('date').textContent = date;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
