<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, height=720, initial-scale=1.0" />
  <title>MADE Clock</title>
  <style>
    html, body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #000000;
      color: #d7b46a;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    .screen {
      position: relative;
      width: 1280px;
      height: 720px;
      box-sizing: border-box;
      padding: 78px 92px;
    }

    .brand {
      font-size: 26px;
      letter-spacing: 8px;
      opacity: 0.72;
      margin-bottom: 34px;
    }

    .time {
      font-size: 118px;
      font-weight: 700;
      line-height: 1;
      margin: 0;
      text-shadow: 0 0 14px rgba(215,180,106,0.16);
    }

    .date {
      margin-top: 22px;
      font-size: 42px;
      line-height: 1.15;
      opacity: 0.92;
    }

    .sub {
      margin-top: 34px;
      font-size: 24px;
      letter-spacing: 4px;
      opacity: 0.42;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="brand">MADE OS</div>
    <div id="time" class="time">00:00</div>
    <div id="date" class="date">Loading...</div>
    <div class="sub">SCREEN SAVER</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();

      const time = now.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
      });

      const date = now.toLocaleDateString([], {
        weekday: 'long',
        month: 'long',
        day: 'numeric'
      });

      document.getElementById('time').textContent = time;
      document.getElementById('date').textContent = date;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
